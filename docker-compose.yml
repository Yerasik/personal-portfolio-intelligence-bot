services:
  portfolio-bot:
    build: .
    container_name: portfolio-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: ${TZ:-Asia/Hong_Kong}
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    working_dir: /app
    command: ["python", "main.py"]

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    # No host port publish — avoids conflict with other Ollama on :11434.
    # portfolio-bot reaches this at http://ollama:11434 on the compose network.
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
